name: Direct Push Alert

# Fires on any non-merge commit landing on main (i.e. someone bypassed the
# auto-merge pipeline). Files a GitHub Issue labeled `direct-push` for triage.
#
# The client-side `.githooks/pre-push` hook blocks this in most cases, but
# scripts, misconfigured tools, or admin pushes can still slip through.
# This is the detection-side safety net.
#
# Mirror these issues into beads with `scripts/sync-gh-issues-to-beads.sh`.

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  check-direct-push:
    name: Detect direct push to main
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'Merge pull request') && !contains(github.event.head_commit.message, 'Merge branch') }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 2

      - name: File alert issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.event.head_commit.id }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
        run: |
          # Idempotency: skip if an open issue already references this SHA.
          existing=$(gh issue list --label direct-push --state open --search "$COMMIT_SHA" --json number --jq 'length')
          if [ "$existing" -gt 0 ]; then
            echo "Existing direct-push issue already covers $COMMIT_SHA — skipping."
            exit 0
          fi

          body=$(cat <<EOF
          **Direct push to \`main\` detected.**

          The auto-merge pipeline was bypassed. All changes to main should go
          through \`bd-ship <bead-id>\` → PR → Mergify queue.

          | Field | Value |
          |---|---|
          | SHA | \`$COMMIT_SHA\` |
          | Author | $COMMIT_AUTHOR |
          | URL | $COMMIT_URL |

          **Commit message:**

          \`\`\`
          $COMMIT_MSG
          \`\`\`

          ### Triage

          1. Was this intentional (e.g. emergency hotfix with human approval)?
          2. If not — who pushed, and how did they bypass the pre-push hook?
          3. Is \`.githooks/pre-push\` installed on the pusher's clone? (\`git config --local core.hooksPath\` should return \`.githooks\`)

          Run \`bash scripts/sync-gh-issues-to-beads.sh\` to mirror this alert into beads.
          EOF
          )

          gh issue create \
            --title "Direct push to main: $COMMIT_SHA" \
            --label direct-push \
            --body "$body"
